name: My First CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      
      - name: Display Secret
        run: echo "Hello $NAME"
        env: 
         NAME: ${{ secrets.MY_NAME }}

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Message
        run: echo "Hello DevOps! My first GitHub Actions workflow is running."

      - name: Show Current Directory
        run: pwd

      - name: List Repository Files
        run: ls -la

      - name: Show Date
        run: date
